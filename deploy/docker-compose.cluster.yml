services:
  stellmap-node1:
    build:
      context: ..
      dockerfile: Dockerfile
    image: stellmap:local
    container_name: stellmap-node1
    hostname: stellmap-node1
    command: ["--config=/etc/stellmap/stellmapd.toml"]
    restart: unless-stopped
    volumes:
      - node1-data:/var/lib/stellmap/node-1
      - ./docker/stellmapd-node-1.toml:/etc/stellmap/stellmapd.toml:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - stellmap-net

  stellmap-node2:
    image: stellmap:local
    container_name: stellmap-node2
    hostname: stellmap-node2
    command: ["--config=/etc/stellmap/stellmapd.toml"]
    restart: unless-stopped
    depends_on:
      - stellmap-node1
    volumes:
      - node2-data:/var/lib/stellmap/node-2
      - ./docker/stellmapd-node-2.toml:/etc/stellmap/stellmapd.toml:ro
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - stellmap-net

  stellmap-node3:
    image: stellmap:local
    container_name: stellmap-node3
    hostname: stellmap-node3
    command: ["--config=/etc/stellmap/stellmapd.toml"]
    restart: unless-stopped
    depends_on:
      - stellmap-node1
    volumes:
      - node3-data:/var/lib/stellmap/node-3
      - ./docker/stellmapd-node-3.toml:/etc/stellmap/stellmapd.toml:ro
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - stellmap-net

networks:
  stellmap-net:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data:
