name: Release StarMap To CVM

on:
  workflow_dispatch:
    inputs:
      vm_hosts:
        description: "目标机器列表，使用分号分隔；留空时读取 VM_HOSTS"
        required: false
        default: ""
      remote_post_upload_cmd:
        description: "上传完成后在目标机器执行的命令；留空则只上传"
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GO_VERSION: "1.25.9"
  TARGET_OS: "linux"
  TARGET_ARCH: "amd64"
  REMOTE_DIR: "/data"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VM_HOSTS: ${{ github.event.inputs.vm_hosts || vars.VM_HOSTS || secrets.VM_HOSTS }}
      VM_USER: ${{ vars.VM_USER || secrets.VM_USER }}
      VM_PORT: ${{ vars.VM_PORT || secrets.VM_PORT || '22' }}
      REMOTE_POST_UPLOAD_CMD: ${{ github.event.inputs.remote_post_upload_cmd || vars.REMOTE_POST_UPLOAD_CMD }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_SSH_PASSWORD: ${{ secrets.VM_SSH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(date -u +'%Y.%m.%d-%H%M%S')-${short_sha}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -trimpath -ldflags="-s -w" \
            -o dist/release/starmapd \
            ./cmd/starmapd

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -trimpath -ldflags="-s -w" \
            -o dist/release/starmapctl \
            ./cmd/starmapctl

          cp config/starmapd.toml dist/release/starmapd.toml
          cp deploy/start.sh dist/release/start.sh
          chmod +x dist/release/starmapd dist/release/starmapctl dist/release/start.sh

      - name: Install SSH client tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Prepare SSH auth
        shell: bash
        run: |
          set -euo pipefail

          [[ -n "${VM_HOSTS}" ]] || { echo "missing VM_HOSTS"; exit 1; }
          [[ -n "${VM_USER}" ]] || { echo "missing VM_USER"; exit 1; }

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"

          if [[ -n "${VM_SSH_KEY}" ]]; then
            printf '%s\n' "${VM_SSH_KEY}" > "${HOME}/.ssh/id_rsa"
            chmod 600 "${HOME}/.ssh/id_rsa"
            echo "SSH_AUTH_MODE=key" >> "${GITHUB_ENV}"
          elif [[ -n "${VM_SSH_PASSWORD}" ]]; then
            echo "::add-mask::${VM_SSH_PASSWORD}"
            echo "SSHPASS=${VM_SSH_PASSWORD}" >> "${GITHUB_ENV}"
            echo "SSH_AUTH_MODE=password" >> "${GITHUB_ENV}"
          else
            echo "missing VM_SSH_KEY or VM_SSH_PASSWORD"
            exit 1
          fi

          IFS=';' read -r -a host_array <<< "${VM_HOSTS}"
          for raw_host in "${host_array[@]}"; do
            host="$(echo "${raw_host}" | xargs)"
            [[ -n "${host}" ]] || continue
            ssh-keyscan -p "${VM_PORT}" -H "${host}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
          done
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Upload release files to CVMs
        shell: bash
        run: |
          set -euo pipefail

          ssh_base_args=(
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -p "${VM_PORT}"
          )
          if [[ "${SSH_AUTH_MODE}" == "key" ]]; then
            ssh_base_args+=(-i "${HOME}/.ssh/id_rsa")
          fi

          run_ssh() {
            local host="$1"
            shift
            if [[ "${SSH_AUTH_MODE}" == "password" ]]; then
              sshpass -e ssh "${ssh_base_args[@]}" "${VM_USER}@${host}" "$@"
            else
              ssh "${ssh_base_args[@]}" "${VM_USER}@${host}" "$@"
            fi
          }

          run_scp() {
            local host="$1"
            if [[ "${SSH_AUTH_MODE}" == "password" ]]; then
              sshpass -e scp "${ssh_base_args[@]}" dist/release/* "${VM_USER}@${host}:${REMOTE_DIR}/"
            else
              scp "${ssh_base_args[@]}" dist/release/* "${VM_USER}@${host}:${REMOTE_DIR}/"
            fi
          }

          IFS=';' read -r -a host_array <<< "${VM_HOSTS}"
          for raw_host in "${host_array[@]}"; do
            host="$(echo "${raw_host}" | xargs)"
            [[ -n "${host}" ]] || continue

            echo "==> uploading files to ${host}"
            run_ssh "${host}" "mkdir -p '${REMOTE_DIR}'"
            run_scp "${host}"
            run_ssh "${host}" "chmod +x '${REMOTE_DIR}/starmapd' '${REMOTE_DIR}/starmapctl' '${REMOTE_DIR}/start.sh'"

            if [[ -n "${REMOTE_POST_UPLOAD_CMD}" ]]; then
              echo "==> running post upload command on ${host}"
              run_ssh "${host}" "cd '${REMOTE_DIR}' && ${REMOTE_POST_UPLOAD_CMD}"
            fi
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: starmapd-${{ steps.meta.outputs.version }}
          path: dist/release
