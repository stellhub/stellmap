# 这个工作流用于把 stellmapd/stellmapctl 的发布制品上传到一台或多台 CVM。
# 关键目标：
# 1. 单机部署时，直接使用仓库中的原始 stellmapd.toml。
# 2. 多机部署时，根据 VM_HOSTS 动态为每台机器渲染自己的 stellmapd.toml。
# 3. 上传时按机器分发各自 bundle，避免多台机器共用同一份配置。
# 4. 首次多机部署走“初始集群 bootstrap”模式，不依赖 stellmapctl add-learner/promote。
name: Release StellMap To CVM

on:
  # 支持手工触发，便于日常发布、灰度和调试。
  workflow_dispatch:
    inputs:
      # 目标机器列表，多个机器之间用分号分隔，例如：
      # 10.0.0.11;10.0.0.12;10.0.0.13
      # 如果这里留空，则回退到 vars/secrets 中的 VM_HOSTS。
      vm_hosts:
        description: "目标机器列表，使用分号分隔；留空时读取 VM_HOSTS"
        required: false
        default: ""
      # 上传完成后在远端执行的命令。
      # 常见用法是：sudo bash /data/start.sh
      # 留空时只上传文件，不自动启动。
      remote_post_upload_cmd:
        description: "上传完成后在目标机器执行的命令；留空则只上传"
        required: false
        default: ""
      # 远端 systemd 服务名，仅用于失败时抓取调试信息。
      remote_service_name:
        description: "远程 systemd 服务名；用于启动失败时抓取日志，默认 stellmapd"
        required: false
        default: "stellmapd"
  # 支持 tag 发布，约定 tag 形如 v1.0.0。
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  # Go 版本与目标平台。
  GO_VERSION: "1.25.9"
  TARGET_OS: "linux"
  TARGET_ARCH: "amd64"
  # 远端上传目录。所有制品先传到这里，再由远端 start.sh 安装到系统目录。
  REMOTE_DIR: "/data"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # VM_HOSTS 支持三层来源：
      # 1. workflow_dispatch 输入
      # 2. GitHub Variables
      # 3. GitHub Secrets
      VM_HOSTS: ${{ github.event.inputs.vm_hosts || vars.VM_HOSTS || secrets.VM_HOSTS }}
      VM_USER: ${{ vars.VM_USER || secrets.VM_USER }}
      VM_PORT: ${{ vars.VM_PORT || secrets.VM_PORT || '22' }}
      REMOTE_POST_UPLOAD_CMD: ${{ github.event.inputs.remote_post_upload_cmd || vars.REMOTE_POST_UPLOAD_CMD }}
      REMOTE_SERVICE_NAME: ${{ github.event.inputs.remote_service_name || vars.REMOTE_SERVICE_NAME || 'stellmapd' }}
      # SSH 支持两种认证方式：
      # 1. 私钥 VM_SSH_KEY
      # 2. 密码 VM_SSH_PASSWORD
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_SSH_PASSWORD: ${{ secrets.VM_SSH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # 发布前先跑测试，避免把明显有问题的版本推到机器上。
      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      # 准备版本号：
      # - 如果当前是 tag 触发，则直接使用 tag 名
      # - 否则使用 UTC 时间戳 + commit short sha
      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(date -u +'%Y.%m.%d-%H%M%S')-${short_sha}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      # 构建 Linux 发布制品，并把基础模板文件拷贝到 dist/release。
      # 注意这里还没有按机器拆分配置，只是生成公共基础包。
      - name: Build release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -trimpath -ldflags="-s -w" \
            -o dist/release/stellmapd \
            ./cmd/stellmapd

          CGO_ENABLED=0 GOOS="${TARGET_OS}" GOARCH="${TARGET_ARCH}" \
            go build -trimpath -ldflags="-s -w" \
            -o dist/release/stellmapctl \
            ./cmd/stellmapctl

          cp config/stellmapd.toml dist/release/stellmapd.toml
          cp deploy/start.sh dist/release/start.sh
          chmod +x dist/release/stellmapd dist/release/stellmapctl dist/release/start.sh

      # 根据 VM_HOSTS 渲染部署 bundle。
      #
      # 输出结构：
      # dist/deploy-bundles/
      #   manifest.tsv                # 记录 node_id -> host -> bundle_dir
      #   node-1/
      #     stellmapd
      #     stellmapctl
      #     start.sh
      #     stellmapd.toml
      #   node-2/
      #     ...
      #
      # 行为分两种：
      # 1. 单机：直接使用原始 stellmapd.toml，不做改写
      # 2. 多机：动态生成每台机器自己的配置
      - name: Render deployment bundles
        shell: bash
        run: |
          set -euo pipefail

          # 去掉字符串首尾空白。
          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "${value}"
          }

          # 从 TOML 模板中读取一个字段。
          # 这里只做轻量读取，不引入额外 TOML 解析依赖。
          toml_get() {
            local file="$1"
            local section="$2"
            local key="$3"

            awk -v target_section="${section}" -v target_key="${key}" '
              function trim_value(value) {
                sub(/^[[:space:]]+/, "", value)
                sub(/[[:space:]]+$/, "", value)
                return value
              }

              /^\[[^]]+\][[:space:]]*$/ {
                current = $0
                gsub(/^\[/, "", current)
                gsub(/\]$/, "", current)
                current = trim_value(current)
                in_section = (current == target_section)
                next
              }

              in_section {
                line = $0
                sub(/#.*/, "", line)
                if (line !~ /=/) {
                  next
                }

                split(line, pair, "=")
                candidate = trim_value(pair[1])
                if (candidate != target_key) {
                  next
                }

                value = substr(line, index(line, "=") + 1)
                value = trim_value(value)
                gsub(/^"/, "", value)
                gsub(/"$/, "", value)
                print value
                exit
              }
            ' "${file}"
          }

          # 从 host:port 形式的地址里提取端口。
          # 这里假设模板中的监听地址都显式带端口。
          extract_port() {
            local addr="$1"
            [[ "${addr}" == *:* ]] || {
              echo "invalid address without port: ${addr}" >&2
              exit 1
            }
            printf '%s' "${addr##*:}"
          }

          # 为每个节点生成独立 data_dir。
          # 如果模板已经是 /.../node-1 这种形式，则替换尾部编号；
          # 否则在模板路径后追加 /node-{id}。
          render_data_dir() {
            local template="$1"
            local node_id="$2"
            local parent
            local base

            template="$(trim "${template}")"
            if [[ -z "${template}" ]]; then
              printf '/var/lib/stellmap/node-%s' "${node_id}"
              return
            fi

            parent="$(dirname "${template}")"
            base="$(basename "${template}")"
            if [[ "${base}" =~ ^node-[0-9]+$ ]]; then
              printf '%s/node-%s' "${parent}" "${node_id}"
              return
            fi
            if [[ "${base}" == "node" ]]; then
              printf '%s/node-%s' "${parent}" "${node_id}"
              return
            fi

            printf '%s/node-%s' "${template%/}" "${node_id}"
          }

          # 生成 1=host1,2=host2 这种地址映射。
          append_mapping() {
            local current="$1"
            local node_id="$2"
            local value="$3"
            if [[ -z "${current}" ]]; then
              printf '%s=%s' "${node_id}" "${value}"
              return
            fi
            printf '%s,%s=%s' "${current}" "${node_id}" "${value}"
          }

          # 把 VM_HOSTS 按分号拆分成数组，并自动忽略空项与多余空白。
          mapfile -t host_array < <(
            printf '%s' "${VM_HOSTS}" |
              tr ';' '\n' |
              sed 's/^[[:space:]]*//; s/[[:space:]]*$//' |
              awk 'NF > 0'
          )
          host_count="${#host_array[@]}"
          [[ "${host_count}" -gt 0 ]] || {
            echo "missing VM_HOSTS" >&2
            exit 1
          }

          # manifest 用于上传阶段逐台读取“机器 -> 对应 bundle”的关系。
          bundle_root="dist/deploy-bundles"
          manifest_path="${bundle_root}/manifest.tsv"
          rm -rf "${bundle_root}"
          mkdir -p "${bundle_root}"
          : > "${manifest_path}"

          # 每台机器都共享同一组二进制和启动脚本，只是配置文件不同。
          copy_common_bundle_files() {
            local bundle_dir="$1"
            mkdir -p "${bundle_dir}"
            install -m 0755 dist/release/stellmapd "${bundle_dir}/stellmapd"
            install -m 0755 dist/release/stellmapctl "${bundle_dir}/stellmapctl"
            install -m 0755 dist/release/start.sh "${bundle_dir}/start.sh"
          }

          # 单机模式：
          # 不修改配置，直接把原始模板复制到 node-1 bundle。
          if [[ "${host_count}" -eq 1 ]]; then
            bundle_dir="${bundle_root}/node-1"
            copy_common_bundle_files "${bundle_dir}"
            install -m 0644 dist/release/stellmapd.toml "${bundle_dir}/stellmapd.toml"
            printf '1\t%s\t%s\n' "${host_array[0]}" "${bundle_dir}" >> "${manifest_path}"
            echo "==> single host deployment bundle uses original stellmapd.toml"
          else
            # 多机模式：
            # 从模板读取共享参数，并根据 VM_HOSTS 动态拼出完整集群配置。
            template_file="dist/release/stellmapd.toml"
            cluster_id="$(toml_get "${template_file}" "node" "cluster_id")"
            region="$(toml_get "${template_file}" "node" "region")"
            data_dir_template="$(toml_get "${template_file}" "node" "data_dir")"
            http_addr="$(toml_get "${template_file}" "server" "http_addr")"
            admin_addr="$(toml_get "${template_file}" "server" "admin_addr")"
            grpc_addr="$(toml_get "${template_file}" "server" "grpc_addr")"
            admin_token="$(toml_get "${template_file}" "auth" "admin_token")"
            replication_token="$(toml_get "${template_file}" "auth" "replication_token")"
            prometheus_sd_token="$(toml_get "${template_file}" "auth" "prometheus_sd_token")"
            request_timeout="$(toml_get "${template_file}" "runtime" "request_timeout")"
            shutdown_timeout="$(toml_get "${template_file}" "runtime" "shutdown_timeout")"
            cleanup_interval="$(toml_get "${template_file}" "registry" "cleanup_interval")"
            cleanup_delete_limit="$(toml_get "${template_file}" "registry" "cleanup_delete_limit")"
            targets_file="$(toml_get "${template_file}" "replication" "targets_file")"

            http_port="$(extract_port "${http_addr}")"
            admin_port="$(extract_port "${admin_addr}")"
            grpc_port="$(extract_port "${grpc_addr}")"

            # 先构建“整个集群共享”的 peers 配置：
            # - peer_ids
            # - peer_http_addrs
            # - peer_grpc_addrs
            # - peer_admin_addrs
            peer_ids=""
            peer_http_addrs=""
            peer_grpc_addrs=""
            peer_admin_addrs=""
            for index in "${!host_array[@]}"; do
              node_id=$((index + 1))
              host="${host_array[${index}]}"
              if [[ -z "${peer_ids}" ]]; then
                peer_ids="${node_id}"
              else
                peer_ids="${peer_ids},${node_id}"
              fi
              peer_http_addrs="$(append_mapping "${peer_http_addrs}" "${node_id}" "${host}:${http_port}")"
              peer_grpc_addrs="$(append_mapping "${peer_grpc_addrs}" "${node_id}" "${host}:${grpc_port}")"
              peer_admin_addrs="$(append_mapping "${peer_admin_addrs}" "${node_id}" "${host}:${admin_port}")"
            done

            # 再为每台机器渲染自己的配置：
            # - node.id 不同
            # - node.data_dir 不同
            # - 集群 peers 配置相同
            for index in "${!host_array[@]}"; do
              node_id=$((index + 1))
              host="${host_array[${index}]}"
              bundle_dir="${bundle_root}/node-${node_id}"
              data_dir="$(render_data_dir "${data_dir_template}" "${node_id}")"

              copy_common_bundle_files "${bundle_dir}"
              # 这里直接生成目标机器最终会使用的 stellmapd.toml。
              cat > "${bundle_dir}/stellmapd.toml" <<EOF
          [node]
          id = ${node_id}
          cluster_id = ${cluster_id}
          region = "${region}"
          data_dir = "${data_dir}"

          [server]
          http_addr = "${http_addr}"
          admin_addr = "${admin_addr}"
          grpc_addr = "${grpc_addr}"

          [auth]
          admin_token = "${admin_token}"
          replication_token = "${replication_token}"
          prometheus_sd_token = "${prometheus_sd_token}"

          [cluster]
          peer_ids = "${peer_ids}"
          peer_grpc_addrs = "${peer_grpc_addrs}"
          peer_http_addrs = "${peer_http_addrs}"
          peer_admin_addrs = "${peer_admin_addrs}"

          [runtime]
          request_timeout = "${request_timeout}"
          shutdown_timeout = "${shutdown_timeout}"

          [registry]
          cleanup_interval = "${cleanup_interval}"
          cleanup_delete_limit = ${cleanup_delete_limit}

          [replication]
          targets_file = "${targets_file}"
          EOF

              printf '%s\t%s\t%s\n' "${node_id}" "${host}" "${bundle_dir}" >> "${manifest_path}"
            done

            echo "==> multi host deployment bundles rendered from VM_HOSTS"
          fi

          # 通过 GITHUB_ENV 把 manifest 路径传给后续步骤。
          echo "DEPLOY_BUNDLE_MANIFEST=${manifest_path}" >> "${GITHUB_ENV}"

      - name: Install SSH client tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      # 输出本次构建与渲染结果，便于排查配置是否符合预期。
      - name: Print release directory
        shell: bash
        run: |
          set -euo pipefail
          echo "==> dist/release contents"
          ls -lah dist/release
          echo "==> dist/deploy-bundles contents"
          find dist/deploy-bundles -maxdepth 2 -type f | sort

      # 准备 SSH 认证与 known_hosts：
      # - 有私钥则优先用私钥
      # - 否则退回密码模式
      # - 再为所有目标机器写入 known_hosts，避免 StrictHostKeyChecking 失败
      - name: Prepare SSH auth
        shell: bash
        run: |
          set -euo pipefail

          [[ -n "${VM_HOSTS}" ]] || { echo "missing VM_HOSTS"; exit 1; }
          [[ -n "${VM_USER}" ]] || { echo "missing VM_USER"; exit 1; }

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"

          if [[ -n "${VM_SSH_KEY}" ]]; then
            printf '%s\n' "${VM_SSH_KEY}" > "${HOME}/.ssh/id_rsa"
            chmod 600 "${HOME}/.ssh/id_rsa"
            echo "SSH_AUTH_MODE=key" >> "${GITHUB_ENV}"
          elif [[ -n "${VM_SSH_PASSWORD}" ]]; then
            echo "::add-mask::${VM_SSH_PASSWORD}"
            echo "SSHPASS=${VM_SSH_PASSWORD}" >> "${GITHUB_ENV}"
            echo "SSH_AUTH_MODE=password" >> "${GITHUB_ENV}"
          else
            echo "missing VM_SSH_KEY or VM_SSH_PASSWORD"
            exit 1
          fi

          IFS=';' read -r -a host_array <<< "${VM_HOSTS}"
          for raw_host in "${host_array[@]}"; do
            host="$(echo "${raw_host}" | xargs)"
            [[ -n "${host}" ]] || continue
            ssh-keyscan -p "${VM_PORT}" -H "${host}" >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
          done
          chmod 600 "${HOME}/.ssh/known_hosts"

      # 逐台上传 release bundle，并在需要时执行远端命令。
      # 注意这里已经不是传公共 dist/release/*，
      # 而是根据 manifest 给每台机器传自己的 bundle。
      - name: Upload release files to CVMs
        shell: bash
        run: |
          set -euo pipefail

          # 上传步骤依赖前面生成的 manifest。
          [[ -n "${DEPLOY_BUNDLE_MANIFEST:-}" ]] || {
            echo "missing DEPLOY_BUNDLE_MANIFEST" >&2
            exit 1
          }
          [[ -f "${DEPLOY_BUNDLE_MANIFEST}" ]] || {
            echo "deployment bundle manifest not found: ${DEPLOY_BUNDLE_MANIFEST}" >&2
            exit 1
          }

          ssh_base_args=(
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -p "${VM_PORT}"
          )
          scp_base_args=(
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="${HOME}/.ssh/known_hosts"
            -P "${VM_PORT}"
          )
          if [[ "${SSH_AUTH_MODE}" == "key" ]]; then
            ssh_base_args+=(-i "${HOME}/.ssh/id_rsa")
            scp_base_args+=(-i "${HOME}/.ssh/id_rsa")
          fi

          # 统一封装 ssh 调用，便于兼容 key/password 两种认证。
          run_ssh() {
            local host="$1"
            shift
            if [[ "${SSH_AUTH_MODE}" == "password" ]]; then
              sshpass -e ssh "${ssh_base_args[@]}" "${VM_USER}@${host}" "$@"
            else
              ssh "${ssh_base_args[@]}" "${VM_USER}@${host}" "$@"
            fi
          }

          # 统一封装 scp 调用，上传当前机器专属 bundle。
          run_scp() {
            local host="$1"
            local bundle_dir="$2"
            if [[ "${SSH_AUTH_MODE}" == "password" ]]; then
              sshpass -e scp "${scp_base_args[@]}" "${bundle_dir}"/* "${VM_USER}@${host}:${REMOTE_DIR}/"
            else
              scp "${scp_base_args[@]}" "${bundle_dir}"/* "${VM_USER}@${host}:${REMOTE_DIR}/"
            fi
          }

          # 如果远端启动失败，则抓取 systemd 与 journal 日志，方便在 Actions 日志里直接看原因。
          print_remote_debug() {
            local host="$1"

            echo "==> [${host}] collecting remote debug info for service ${REMOTE_SERVICE_NAME}"
            run_ssh "${host}" "\
              set +e; \
              echo '--- systemctl status ${REMOTE_SERVICE_NAME} ---'; \
              sudo systemctl status '${REMOTE_SERVICE_NAME}' --no-pager -l || true; \
              echo '--- journalctl ${REMOTE_SERVICE_NAME} (last 80 lines) ---'; \
              sudo journalctl -u '${REMOTE_SERVICE_NAME}' -n 80 --no-pager || true"
          }

          host_failures=0

          # 逐台读取 manifest：
          # node_id   host   bundle_dir
          # 然后执行：
          # 1. 创建远端目录
          # 2. 上传对应 bundle
          # 3. 修正可执行权限
          # 4. 可选执行远端启动命令
          while IFS=$'\t' read -r node_id host bundle_dir; do
            [[ -n "${host}" ]] || continue

            echo "==> [${host}] preparing remote directory ${REMOTE_DIR} for node ${node_id}"
            if ! run_ssh "${host}" "mkdir -p '${REMOTE_DIR}'"; then
              echo "ERROR: [${host}] failed to create remote directory ${REMOTE_DIR}"
              host_failures=$((host_failures + 1))
              continue
            fi

            echo "==> [${host}] uploading bundle ${bundle_dir}"
            if ! run_scp "${host}" "${bundle_dir}"; then
              echo "ERROR: [${host}] file upload failed"
              host_failures=$((host_failures + 1))
              continue
            fi

            echo "==> [${host}] marking binaries executable"
            if ! run_ssh "${host}" "chmod +x '${REMOTE_DIR}/stellmapd' '${REMOTE_DIR}/stellmapctl' '${REMOTE_DIR}/start.sh'"; then
              echo "ERROR: [${host}] chmod failed after upload"
              host_failures=$((host_failures + 1))
              continue
            fi

            # REMOTE_POST_UPLOAD_CMD 由调用方决定。
            # 常见值：
            # sudo bash /data/start.sh
            if [[ -n "${REMOTE_POST_UPLOAD_CMD}" ]]; then
              echo "==> [${host}] running post upload command"
              if ! run_ssh "${host}" "cd '${REMOTE_DIR}' && ${REMOTE_POST_UPLOAD_CMD}"; then
                echo "ERROR: [${host}] post upload command failed"
                print_remote_debug "${host}" || true
                host_failures=$((host_failures + 1))
                continue
              fi
            fi

            echo "==> [${host}] completed successfully"
          done < "${DEPLOY_BUNDLE_MANIFEST}"

          if (( host_failures > 0 )); then
            echo "ERROR: ${host_failures} host(s) failed during upload or remote execution"
            exit 1
          fi

      # 上传工作流产物，便于之后下载查看：
      # - 公共 release 目录
      # - 每台机器的 deploy bundle
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stellmapd-${{ steps.meta.outputs.version }}
          path: |
            dist/release
            dist/deploy-bundles
