[node]
id = __NODE_ID__
cluster_id = __CLUSTER_ID__
region = "__REGION__"
data_dir = "__DATA_DIR__"

[server]
http_addr = "__HTTP_ADDR__"
admin_addr = "__ADMIN_ADDR__"
grpc_addr = "__GRPC_ADDR__"

[auth]
admin_token = "__ADMIN_TOKEN__"
replication_token = "__REPLICATION_TOKEN__"
prometheus_sd_token = "__PROMETHEUS_SD_TOKEN__"

[cluster]
peer_ids = "__PEER_IDS__"
peer_grpc_addrs = "__PEER_GRPC_ADDRS__"
peer_http_addrs = "__PEER_HTTP_ADDRS__"
peer_admin_addrs = "__PEER_ADMIN_ADDRS__"

[runtime]
request_timeout = "__REQUEST_TIMEOUT__"
shutdown_timeout = "__SHUTDOWN_TIMEOUT__"

[registry]
cleanup_interval = "__REGISTRY_CLEANUP_INTERVAL__"
cleanup_delete_limit = __REGISTRY_CLEANUP_DELETE_LIMIT__

[replication]
targets_file = "__REPLICATION_TARGETS_FILE__"
